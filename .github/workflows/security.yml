name: Security Testing

on:
  push:
    branches: ['**']  # Run on ALL branches
  pull_request:
    branches: ['**']  # Run on PRs to ALL branches
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-tests:
    runs-on: ubuntu-latest
    name: Run Security Test Suite
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run security tests
      id: security-tests
      run: |
        cd backend
        echo "🔒 Running PeerNetwork Security Tests"
        echo "======================================"
        
        # Run the security test suite
        python3 tests/security_test_suite.py
        
        # Check if security-test-report.json was created
        if [ -f "security-test-report.json" ]; then
          echo "✅ Security tests completed"
          
          # Extract security score
          SECURITY_SCORE=$(python3 -c "
          import json
          with open('security-test-report.json') as f:
              data = json.load(f)
              print(data['summary']['security_score'])
          ")
          
          echo "security_score=$SECURITY_SCORE" >> $GITHUB_OUTPUT
          
          # Check if score meets threshold
          if [ $SECURITY_SCORE -lt 80 ]; then
            echo "❌ Security score $SECURITY_SCORE is below threshold of 80"
            exit 1
          else
            echo "✅ Security score $SECURITY_SCORE meets threshold"
          fi
        else
          echo "❌ Security test report not generated"
          exit 1
        fi
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-test-results
        path: |
          backend/security-test-report.json
          backend/executive-security-summary.json
        retention-days: 30
        
    - name: Generate security badge
      if: success()
      run: |
        cd backend
        python3 -c "
        import json
        with open('security-test-report.json') as f:
            data = json.load(f)
            score = data['summary']['security_score']
            color = 'brightgreen' if score >= 80 else 'yellow' if score >= 60 else 'red'
            print(f'security score: {score}/100')
        "
        
    - name: Notify on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        channel: '#security-alerts'
        status: ${{ job.status }}
        text: |
          Security tests failed in ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
        username: Security Bot
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
    - name: Comment on PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('backend/security-test-report.json', 'utf8'));
            
            const summary = report.summary;
            const vulnerabilities = report.vulnerabilities || [];
            
            let comment = `## 🔒 Security Test Results\n\n`;
            comment += `**Security Score:** ${summary.security_score}/100\n`;
            comment += `**Status:** ${summary.overall_status}\n`;
            comment += `**Tests Run:** ${summary.total_tests}\n`;
            comment += `**Vulnerabilities Found:** ${summary.total_vulnerabilities}\n\n`;
            
            if (vulnerabilities.length > 0) {
              comment += `### 🚨 Vulnerabilities Found\n\n`;
              vulnerabilities.slice(0, 5).forEach(vuln => {
                comment += `- **${vuln.type}** (${vuln.severity}): ${vuln.description}\n`;
              });
              if (vulnerabilities.length > 5) {
                comment += `\n...and ${vulnerabilities.length - 5} more\n`;
              }
            } else {
              comment += `✅ No security vulnerabilities detected\n`;
            }
            
            comment += `\n[View Full Report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not generate security test comment:', error.message);
          }