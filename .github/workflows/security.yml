name: PHPUnit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  phpunit:
    name: PHPUnit Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, openssl, ffi
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit tests/Unit --colors=always --testdox

      - name: Generate test summary
        if: always()
        run: |
          echo "## PHPUnit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          vendor/bin/phpunit tests/Unit --testdox --no-progress 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true