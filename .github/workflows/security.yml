name: Security Testing (Simple)

on:
  push:
    branches: ['**']  # Run on ALL branches
  pull_request:
    branches: ['**']  # Run on PRs to ALL branches
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-tests:
    runs-on: ubuntu-latest
    name: Run Security Test Suite
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run security tests
      id: security-tests
      run: |
        echo "🔒 Running PeerNetwork Security Tests"
        echo "======================================"
        
        # Run the security test suite
        python3 tests/security_test_suite.py
        
        # Check if security-test-report.json was created
        if [ -f "security-test-report.json" ]; then
          echo "✅ Security tests completed"
          
          # Extract security score
          SECURITY_SCORE=$(python3 -c "
          import json
          with open('security-test-report.json') as f:
              data = json.load(f)
              print(data['summary']['security_score'])
          ")
          
          echo "security_score=$SECURITY_SCORE" >> $GITHUB_OUTPUT
          
          # For demo purposes, always pass (simulated tests)
          # In production, use: if [ $SECURITY_SCORE -lt 80 ]; then
          echo "✅ Demo mode: Tests always pass (simulated vulnerabilities)"
          
        else
          echo "❌ Security test report not generated"
          exit 1
        fi
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-test-results
        path: |
          security-test-report.json
          executive-security-summary.json
        retention-days: 30
        
    - name: Generate summary
      if: always()
      run: |
        echo "📊 SECURITY TEST SUMMARY"
        echo "========================"
        
        if [ -f "security-test-report.json" ]; then
          python3 -c "
          import json
          with open('security-test-report.json') as f:
              data = json.load(f)
              summary = data['summary']
              print(f'Security Score: {summary[\"security_score\"]}/100')
              print(f'Overall Status: {summary[\"overall_status\"]}')
              print(f'Tests Run: {summary[\"total_tests\"]}')
              print(f'Vulnerabilities Found: {summary[\"total_vulnerabilities\"]}')
              
              if 'vulnerabilities' in data and data['vulnerabilities']:
                  print('\\n🔍 Top Vulnerabilities:')
                  for i, vuln in enumerate(data['vulnerabilities'][:3], 1):
                      print(f'  {i}. {vuln[\"type\"]} ({vuln[\"severity\"]}): {vuln[\"description\"][:100]}...')
          "
        else
          echo "No security report generated"
        fi